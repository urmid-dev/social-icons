<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Social Icons</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">Public icon host</p>
        <h1>Social Icons</h1>
        <p class="lede">Deploy this folder anywhere static files are supported, then use the direct SVG URLs below.</p>
      </section>

      <section class="grid" aria-label="Available icons">
        <article class="icon-card">
          <img src="./icons/youtube.svg" alt="YouTube icon">
          <div>
            <h2>YouTube</h2>
            <code>/icons/youtube.svg</code>
          </div>
        </article>

        <article class="icon-card">
          <img src="./icons/linkedin.svg" alt="LinkedIn icon">
          <div>
            <h2>LinkedIn</h2>
            <code>/icons/linkedin.svg</code>
          </div>
        </article>

        <article class="icon-card">
          <img src="./icons/substack.svg" alt="Substack icon">
          <div>
            <h2>Substack</h2>
            <code>/icons/substack.svg</code>
          </div>
        </article>

        <article class="icon-card">
          <img src="./icons/instagram.svg" alt="Instagram icon">
          <div>
            <h2>Instagram</h2>
            <code>/icons/instagram.svg</code>
          </div>
        </article>

        <article class="icon-card">
          <img src="./icons/x.svg" alt="X icon">
          <div>
            <h2>X</h2>
            <code>/icons/x.svg</code>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
